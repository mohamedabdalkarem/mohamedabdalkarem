<svg width="100%" viewBox="0 0 900 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07090f"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#07090f" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#3b82f6" stop-opacity="0.9"/>
      <stop offset="70%"  stop-color="#1d9e75" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#07090f" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="topEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#07090f" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#3b82f6" stop-opacity="0.5"/>
      <stop offset="50%"  stop-color="#60a5fa" stop-opacity="0.8"/>
      <stop offset="80%"  stop-color="#3b82f6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#07090f" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bottomEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#07090f" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#1e3a8a" stop-opacity="0.4"/>
      <stop offset="70%"  stop-color="#0f6e56" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#07090f" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#60a5fa"/>
      <stop offset="50%"  stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <radialGradient id="glowRight" cx="90%" cy="15%" r="55%">
      <stop offset="0%"   stop-color="#1e3a8a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#07090f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowLeft" cx="10%" cy="85%" r="40%">
      <stop offset="0%"   stop-color="#0f6e56" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#07090f" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="rc">
      <rect width="900" height="340" rx="14" ry="14"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rc)">
    <!-- Background -->
    <rect width="900" height="340" fill="url(#bgGrad)"/>
    <rect width="900" height="340" fill="url(#glowRight)"/>
    <rect width="900" height="340" fill="url(#glowLeft)"/>

    <!-- Grid verticals -->
    <g stroke="#3b82f6" stroke-opacity="0.05" stroke-width="0.5">
      <line x1="40"  y1="0" x2="40"  y2="340"/>
      <line x1="80"  y1="0" x2="80"  y2="340"/>
      <line x1="120" y1="0" x2="120" y2="340"/>
      <line x1="160" y1="0" x2="160" y2="340"/>
      <line x1="200" y1="0" x2="200" y2="340"/>
      <line x1="240" y1="0" x2="240" y2="340"/>
      <line x1="280" y1="0" x2="280" y2="340"/>
      <line x1="320" y1="0" x2="320" y2="340"/>
      <line x1="360" y1="0" x2="360" y2="340"/>
      <line x1="400" y1="0" x2="400" y2="340"/>
      <line x1="440" y1="0" x2="440" y2="340"/>
      <line x1="480" y1="0" x2="480" y2="340"/>
      <line x1="520" y1="0" x2="520" y2="340"/>
      <line x1="560" y1="0" x2="560" y2="340"/>
      <line x1="600" y1="0" x2="600" y2="340"/>
      <line x1="640" y1="0" x2="640" y2="340"/>
      <line x1="680" y1="0" x2="680" y2="340"/>
      <line x1="720" y1="0" x2="720" y2="340"/>
      <line x1="760" y1="0" x2="760" y2="340"/>
      <line x1="800" y1="0" x2="800" y2="340"/>
      <line x1="840" y1="0" x2="840" y2="340"/>
      <line x1="880" y1="0" x2="880" y2="340"/>
    </g>
    <g stroke="#3b82f6" stroke-opacity="0.05" stroke-width="0.5">
      <line x1="0" y1="40"  x2="900" y2="40"/>
      <line x1="0" y1="80"  x2="900" y2="80"/>
      <line x1="0" y1="120" x2="900" y2="120"/>
      <line x1="0" y1="160" x2="900" y2="160"/>
      <line x1="0" y1="200" x2="900" y2="200"/>
      <line x1="0" y1="240" x2="900" y2="240"/>
      <line x1="0" y1="280" x2="900" y2="280"/>
      <line x1="0" y1="320" x2="900" y2="320"/>
    </g>

    <!-- Top edge glow -->
    <rect x="0" y="0" width="900" height="1.5" fill="url(#topEdge)"/>
    <!-- Left accent bar -->
    <rect x="0" y="0" width="4"    height="340" fill="url(#accentLine)"/>

    <!-- filepath -->
    <circle cx="44" cy="34" r="3.5" fill="#3b82f6" fill-opacity="0.5"/>
    <text x="56" y="39" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="12" fill="#94a3b8" fill-opacity="0.5" letter-spacing="0.5">Abkrem</text>

    <!-- Name -->
    <text x="44" y="115" font-family="'Arial Black', 'Impact', sans-serif" font-size="62" font-weight="900" fill="url(#nameGrad)" letter-spacing="-1">I'm Mohamed Abdelkareem</text>

    <!-- Terminal line -->
    <text x="44"  y="190" font-family="'Courier New', monospace" font-size="15" font-weight="700" fill="#3b82f6" fill-opacity="0.8">&gt;</text>
    <text x="66"  y="190" font-family="'Courier New', monospace" font-size="15" font-weight="700" fill="#34d399" letter-spacing="0.5">engineering data pipelines_</text>

    <!-- Tags row -->
    <!-- DATA ENGINEERING -->
    <rect x="44"  y="210" width="160" height="26" rx="5" fill="#0a1628" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="0.6"/>
    <text x="124" y="228" font-family="'Courier New', monospace" font-size="11" font-weight="700" fill="#93c5fd" letter-spacing="1.2" text-anchor="middle">DATA ENGINEERING</text>

    <!-- MODELING -->
    <rect x="214" y="210" width="102" height="26" rx="5" fill="#0a1f1c" stroke="#14b8a6" stroke-opacity="0.4" stroke-width="0.6"/>
    <text x="265" y="228" font-family="'Courier New', monospace" font-size="11" font-weight="700" fill="#5eead4" letter-spacing="1.2" text-anchor="middle">MODELING</text>

    <!-- BIG DATA -->
    <rect x="326" y="210" width="96"  height="26" rx="5" fill="#1a1200" stroke="#f59e0b" stroke-opacity="0.35" stroke-width="0.6"/>
    <text x="374" y="228" font-family="'Courier New', monospace" font-size="11" font-weight="700" fill="#fcd34d" letter-spacing="1.2" text-anchor="middle">BIG DATA</text>


    <!-- Bottom strip separator -->
    <line x1="0" y1="278" x2="900" y2="278" stroke="#3b82f6" stroke-opacity="0.1" stroke-width="0.5"/>

    <!-- Strip: Role -->
    <text x="44"  y="300" font-family="'Arial', sans-serif" font-size="15" font-weight="700" fill="#e2e8f0">Data Engineer</text>
    <text x="44"  y="320" font-family="'Courier New', monospace" font-size="10" fill="#94a3b8" fill-opacity="0.38" letter-spacing="2">ROLE</text>

    <!-- Strip divider -->
    <line x1="240" y1="282" x2="240" y2="332" stroke="#3b82f6" stroke-opacity="0.1" stroke-width="0.5"/>

    <!-- Strip: Specialty -->
    <text x="260" y="300" font-family="'Arial', sans-serif" font-size="15" font-weight="700" fill="#e2e8f0">Big Data · ETL · Warehousing</text>
    <text x="260" y="320" font-family="'Courier New', monospace" font-size="10" fill="#94a3b8" fill-opacity="0.38" letter-spacing="2">SPECIALTY</text>

    <!-- Bottom edge -->
    <rect x="0" y="337" width="900" height="3" fill="url(#bottomEdge)"/>
  </g>
</svg>
